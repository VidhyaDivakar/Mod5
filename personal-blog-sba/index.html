<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personal-Blog-SBA</title>
    <script defer src="script.js"></script>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <h1>Welcome to my Blog</h1>

    <!--section for new posts  -->
    <section id="newPostSection">
        <h2>Create New Post</h2>
        <!-- creating new form for the posts with input fields for the title-->
        <form id="postForm"  novalidate>

            <div>
                <label for="title">Title:</label>
                <input type="text" id="title" name="title" autocomplete="title" required/>
                <span id="titleError" class="error"></span>
            </div>

            <!-- The Post content is right here -->
            <div>
                <label for="content">Content:</label>
                <textarea id="content" name="content" required></textarea>
                <span id="contentError" class="error"></span>
            </div>

            <!-- Submit Button -->
            <button type="submit" id="addPost">Add Post</button>

        </form>
    </section>

    <!-- Blog Posts Display Section -->
    <section id="postSection">
        <h2>Blog Posts</h2>
        <div id="postsContainer">
            <!-- Dynamic posts will be inserted here -->
        </div>
    </section>

</body>

</html>
